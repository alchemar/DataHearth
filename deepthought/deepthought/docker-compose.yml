version: '3.8'
# ==============================================================================
# DEEPTHOUGHT AI SERVER — DOCKER COMPOSE
# Host: 10.50.0.14
# GPUs: 2x Tesla P40 (Pascal, 24 GB VRAM each = 48 GB total)
# Generated by generate_deepthought.py
#
# GPU NOTES:
#   - Both P40s are exposed to Ollama via "count: all"
#   - llama.cpp / Ollama will automatically split layers across both cards
#   - Set OLLAMA_SCHED_SPREAD=1 so layers are distributed evenly
#   - Pascal does NOT support flash attention — leave OLLAMA_FLASH_ATTENTION unset
#   - KV cache quantisation (q8_0) halves VRAM use for long contexts on 70B+ models
#   - OLLAMA_MAX_LOADED_MODELS=1 ensures only one model is resident;
#     set to 2 if you want a small always-hot model alongside a large one
#     (e.g. qwen3:4b ~3 GB + deepseek-r1:70b ~42 GB = 45 GB, fits in 48 GB)
# ==============================================================================

services:

  # ============================================================================
  # OLLAMA — LLM Inference Server
  #
  # Models are stored at: /mnt/disk0/Deepthought/models
  # Pull models with:  docker exec ollama ollama pull <model>
  #
  # Recommended large models for dual P40 (48 GB VRAM):
  #   deepseek-r1:70b-distill-q4_K_M   ~42 GB   reasoning model
  #   qwen2.5-coder:32b-instruct-q8_0  ~35 GB   code assistant
  #   hermes3:70b-instruct-q4_0        ~40 GB   general chat
  #   llama3.3:70b-instruct-q4_K_M     ~42 GB   general chat
  #   qwen3:4b-instruct                ~3 GB    fast small model
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      # All pulled models land here — survives container rebuilds
      - /mnt/disk0/Deepthought/models:/root/.ollama/models
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_SCHED_SPREAD=1         # spread layers evenly across all GPUs
      # Pascal (P40) does NOT support flash attention.
      # Setting OLLAMA_FLASH_ATTENTION=1 silently falls back anyway, so omit it.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all              # expose BOTH P40s to Ollama
              capabilities: [gpu]

  # ============================================================================
  # OLLAMA PRELOAD — pin qwen3:30b-a3b-q8_0 in VRAM on startup
  # ============================================================================
  ollama-preload:
    image: curlimages/curl:latest
    container_name: ollama-preload
    restart: "no"
    depends_on:
      - ollama
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama...';
        until curl -s http://ollama:11434 > /dev/null; do sleep 2; done;
        echo 'Preloading qwen3:30b-a3b-q8_0...';
        curl -s -X POST http://ollama:11434/api/generate
          -d '{"model": "qwen3:30b-a3b-q8_0", "prompt": "", "keep_alive": -1}';
        echo 'qwen3:30b-a3b-q8_0 pinned in VRAM.';
      "

  # ============================================================================
  # OPEN WEBUI — Chat Interface + Model Switcher
  #
  # Access: http://10.50.0.14:8080
  # First launch creates an admin account — set it up immediately.
  # ============================================================================
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /mnt/disk0/Deepthought/openwebui:/app/backend/data
    environment:
      # Point OpenWebUI at the Ollama container on the same Docker network
      - OPENAI_API_BASE_URL=http://ollama:11434/v1
      - OPENAI_API_KEY=sk-no-key-required
      # Enables the built-in Ollama integration (direct model management)
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
